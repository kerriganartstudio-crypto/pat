<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kerrigan Studio - OS 2001 FINAL</title>
    <style>
        /* === SYSTEM CORE === */
        body { 
            background: #000 url('bliss.jpg') no-repeat center center fixed; 
            background-size: cover;
            margin: 0; overflow: hidden; font-family: 'Tahoma', sans-serif; 
            height: 100vh; width: 100vw;
        }
        
        #crt-overlay {
            position: fixed; inset: 0; z-index: 999999; pointer-events: none; 
            background: linear-gradient(rgba(18,16,16,0) 50%, rgba(0,0,0,0.25) 50%); 
            background-size: 100% 4px; 
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
        }

        #boot-screen { position: fixed; inset: 0; background: #000; color: #3f0; font-family: monospace; z-index: 2000000; padding: 40px; }
        
        /* === DESKTOP & ICONS === */
        #desktop { display: flex; flex-direction: column; flex-wrap: wrap; height: calc(100vh - 40px); padding: 15px; align-content: flex-start; }
        .desktop-icon { width: 85px; margin: 10px; text-align: center; cursor: pointer; color: white; font-size: 11px; text-shadow: 1px 1px 2px #000; }
        .desktop-icon img { width: 40px; height: 40px; margin-bottom: 4px; }

        /* === WINDOWS (XP STYLE) === */
        .os-window { position: absolute; display: none; background: #ece9d8; border: 3px solid #0055ea; border-radius: 8px 8px 0 0; box-shadow: 5px 5px 20px rgba(0,0,0,0.5); z-index: 100; min-width: 250px;}
        .window-header { background: linear-gradient(to right, #0058e6, #2881fa); color: white; padding: 5px 10px; font-weight: bold; display: flex; justify-content: space-between; align-items: center; border-radius: 4px 4px 0 0; }
        .close-btn { background: #e0645c; color: white; border: 1px solid #fff; border-radius: 3px; cursor: pointer; padding: 0 6px; }

        /* === TASKBAR === */
        #taskbar { position: absolute; bottom: 0; width: 100%; height: 32px; background: linear-gradient(to bottom, #245edb 0%, #3f8cf3 9%, #245edb 18%, #1941a5 100%); display: flex; align-items: center; z-index: 9000; }
        #start-btn { background: linear-gradient(to bottom, #388e3c, #2e7331); color: white; font-weight: bold; border: none; height: 100%; padding: 0 15px; cursor: pointer; border-radius: 0 10px 10px 0; }
        #clock { color: white; padding-right: 15px; font-size: 11px; font-weight: bold; margin-left: auto; }

        /* === START MENU === */
        #start-menu { display: none; position: absolute; bottom: 32px; left: 0; width: 250px; background: #fff; border: 2px solid #0058e6; border-radius: 8px 8px 0 0; z-index: 10000; }
        .start-item { padding: 8px 10px; cursor: pointer; font-size: 13px; display: flex; align-items: center; gap: 10px; }
        .start-item:hover { background: #2881fa; color: white; }

        #totem-overlay { display: none; flex-direction: column; justify-content: center; align-items: center; position: fixed; inset: 0; background: #000; color: #fff; z-index: 9999999; text-align: center; }
        .wake-up-btn { background: transparent; color: #0f0; border: 1px solid #0f0; padding: 10px 20px; font-family: monospace; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

<div id="matrix-intro" style="position:fixed; inset:0; background:#000; color:#0f0; font-family:monospace; z-index:3000000; display:flex; flex-direction:column; justify-content:center; padding:40px; font-size:24px;">
    <div id="matrix-text"></div>
    <span id="cursor" style="width:12px; height:24px; background:#0f0; display:inline-block; animation: blink 0.8s infinite;"></span>
</div>

<div id="boot-screen">
    <p>KERRIGAN STUDIO OS [Version 4.1.36]</p>
    <p>SYSTEM: AUTHORIZED | OIF OEF USMC 06-10</p>
    <p>INITIALIZING SYSTEM.....</p>
</div>

<div id="desktop-wrapper">
    <div id="desktop">
        <div class="desktop-icon" ondblclick="openWin('paint-window')"><img src="painticon.png"><div>Paint App</div></div>
        <div class="desktop-icon" ondblclick="openWin('tcg-window')"><img src="tcgicon.PNG"><div>Kerrigan TCG</div></div>
        <div class="desktop-icon" ondblclick="window.open('https://www.instagram.com/kerrigan_studio/', '_blank')"><img src="https://img.icons8.com/color/48/000000/instagram-new--v1.png"><div>Instagram.exe</div></div>
        <div class="desktop-icon" ondblclick="window.open('https://www.linkedin.com/in/patrick-kerrigan-281208283/', '_blank')"><img src="https://img.icons8.com/color/48/000000/linkedin.png"><div>LinkedIn.exe</div></div>
        <div class="desktop-icon" ondblclick="triggerTotem()"><img src="totem.png"><div>Totem.exe</div></div>
    </div>
</div>

<div id="start-menu">
    <div style="background: #0058e6; color: white; padding: 10px; font-weight: bold;">Kerrigan Studio</div>
    <div class="start-item" onclick="openWin('paint-window')">Paint App</div>
    <div class="start-item" onclick="window.open('https://drive.google.com/file/d/1aFLH23YTGQPCAKYtwsxA23GtRa5VoWhp/view', '_blank')">Get Resume</div>
</div>

<div id="taskbar">
    <button id="start-btn">start</button>
    <div id="clock">12:00 PM</div>
</div>

<div id="totem-overlay">
    <h1>Whose dream are we in?</h1>
    <button class="wake-up-btn" onclick="wakeUp()">[CLICK TO WAKE UP]</button>
</div>

<div class="os-window" id="paint-window" style="top:15%; left:15%; width:400px; height:300px;">
    <div class="window-header"><span>Paint App</span><button class="close-btn" onclick="closeWin('paint-window')">X</button></div>
    <div class="window-content"><canvas id="p-canvas" width="380" height="240" style="background:white; border:1px solid #000;"></canvas></div>
</div>

<script>
// --- LOGIC ---
const introText = ["Knock Knock...Wake up...", "Kerrigan Studio has you...", "Follow the EYE"];
let lineIndex = 0, charIndex = 0;
const textElement = document.getElementById('matrix-text');

function typeWriter() {
    if (lineIndex < introText.length) {
        if (charIndex < introText[lineIndex].length) {
            textElement.innerHTML += introText[lineIndex].charAt(charIndex);
            charIndex++;
            setTimeout(typeWriter, 50);
        } else {
            setTimeout(() => { textElement.innerHTML = ""; charIndex = 0; lineIndex++; typeWriter(); }, 1500);
        }
    } else {
        document.getElementById('matrix-intro').style.display = "none";
        document.getElementById('boot-screen').style.display = "none";
    }
}
document.addEventListener('DOMContentLoaded', typeWriter);

function openWin(id) { document.getElementById(id).style.display = 'block'; }
function closeWin(id) { document.getElementById(id).style.display = 'none'; }

document.getElementById('start-btn').addEventListener('click', () => {
    const menu = document.getElementById('start-menu');
    menu.style.display = (menu.style.display === 'block') ? 'none' : 'block';
});

function triggerTotem() {
    document.getElementById('totem-overlay').style.display = 'flex';
}

function wakeUp() {
    window.location.href = 'https://kerriganartstudioportfolio.my.canva.site/patrick-kerrigan-graphic-designer-2026';
}

function updateClock() {
    const now = new Date();
    document.getElementById('clock').innerText = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}
setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
