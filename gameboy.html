<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
    </style>
</head>
<body>
    <div id="game"></div>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const romName = urlParams.get('rom') || 'SuperMarioBrosDeluxe.gbc';

        window.EJS_player = '#game';
        
        // SWITCHED TO THE STABLE 'gb' CORE
        window.EJS_core = 'gb'; 
        
        // BULLETPROOF DIRECT URL TO YOUR GAMES
        window.EJS_gameUrl = 'https://kerriganartstudio-crypto.github.io/pat/' + romName;
        
        window.EJS_pathtodata = 'https://cdn.emulatorjs.org/latest/data/';
    </script>
    <script src="https://cdn.emulatorjs.org/latest/data/loader.js"></script>
</body>
</html>
